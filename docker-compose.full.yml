version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: financialcopilot-db
    environment:
      POSTGRES_DB: financialcopilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financialcopilot-network

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: financialcopilot-ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - financialcopilot-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financialcopilot-backend
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=financialcopilot;Username=postgres;Password=postgres
      - AiEngine__Url=http://ai-engine:8000
    networks:
      - financialcopilot-network
    depends_on:
      - postgres
      - ai-engine

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: financialcopilot-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    networks:
      - financialcopilot-network
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  financialcopilot-network:
    driver: bridge
