services:
  # Backend .NET API
  - type: web
    name: finnova-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: finnova-db
          property: connectionString
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: FinancialCopilot
      - key: Jwt__Audience
        value: FinancialCopilotUsers
      - key: AiEngine__Url
        value: https://finnova-ai-engine.onrender.com
      - key: AiEngine__ApiKey
        generateValue: true
      - key: Email__SmtpHost
        value: smtp.gmail.com
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SmtpUser
        value: ctslabscartagena@gmail.com
      - key: Email__SmtpPassword
        value: ""
      - key: Email__FromName
        value: FINNOVA
      - key: Email__FromEmail
        value: ctslabscartagena@gmail.com
      - key: AdminBootstrap__Email
        value: ""
      - key: AdminBootstrap__Password
        value: ""

  # AI Engine Python
  - type: web
    name: finnova-ai
    runtime: docker
    dockerfilePath: ./ai-engine/Dockerfile
    dockerContext: ./ai-engine
    envVars:
      - key: PORT
        value: 8000
      - key: AI_ENGINE_API_KEY
        fromService:
          name: finnova-backend
          type: web
          envVarKey: AiEngine__ApiKey

  # Frontend Next.js
  - type: web
    name: finnova-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    buildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: https://finnova-backend-hquh.onrender.com/api
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://finnova-backend-hquh.onrender.com/api
      - key: NODE_VERSION
        value: "20"

databases:
  - name: finnova-db
    databaseName: financialcopilot
    user: postgres
    plan: free
